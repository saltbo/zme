name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Architecture boundaries
        run: pnpm lint:arch

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + api)
        run: pnpm test

      - name: Coverage report
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
